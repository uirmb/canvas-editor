<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UcDoc Save / Open / DOCX Export Demo</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei',
          sans-serif;
        color: #1f2937;
        background: #f3f4f6;
      }

      .page {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .ribbon {
        display: flex;
        flex-wrap: wrap;
        align-items: stretch;
        gap: 0;
        padding: 8px 12px 6px;
        background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        border-bottom: 1px solid #dbe3ef;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
      }

      .ribbon-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 96px;
        padding: 0 10px 4px;
        border-right: 1px solid #e5e7eb;
      }

      .ribbon-group:first-child {
        padding-left: 0;
      }

      .ribbon-group:last-child {
        border-right: 0;
      }

      .ribbon-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 4px;
        min-height: 32px;
      }

      .ribbon-title {
        color: #64748b;
        font-size: 12px;
        line-height: 1;
        text-align: center;
        user-select: none;
      }

      .ribbon-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        min-width: 32px;
        height: 30px;
        padding: 0 8px;
        border: 1px solid transparent;
        border-radius: 6px;
        color: #111827;
        background: transparent;
        cursor: pointer;
        font-size: 13px;
        white-space: nowrap;
      }

      .ribbon-button:hover {
        border-color: #cbd5e1;
        background: #ffffff;
      }

      .ribbon-button.primary {
        border-color: #bfdbfe;
        color: #1d4ed8;
        background: #eff6ff;
      }

      .ribbon-button.icon {
        width: 32px;
        padding: 0;
        font-weight: 700;
      }

      .ribbon-select {
        height: 30px;
        min-width: 92px;
        padding: 0 8px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        color: #111827;
        background: #ffffff;
        font-size: 13px;
      }

      .ribbon-color {
        width: 34px;
        height: 30px;
        padding: 2px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #ffffff;
        cursor: pointer;
      }

      .status {
        margin-left: auto;
        align-self: center;
        padding: 0 4px 0 12px;
        color: #6b7280;
        font-size: 13px;
        white-space: nowrap;
      }

      .content {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 12px;
        min-height: 0;
        flex: 1;
        padding: 12px;
      }

      #editor {
        min-height: 720px;
        overflow: auto;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        background: #ffffff;
      }

      .panel {
        display: flex;
        min-height: 0;
        flex-direction: column;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        background: #ffffff;
      }

      .panel-title {
        padding: 12px;
        border-bottom: 1px solid #e5e7eb;
        font-weight: 600;
      }

      .panel textarea {
        flex: 1;
        min-height: 0;
        width: 100%;
        padding: 12px;
        border: 0;
        outline: none;
        resize: none;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          'Liberation Mono', monospace;
        font-size: 12px;
        line-height: 1.6;
      }

      .hint {
        padding: 8px 12px;
        border-top: 1px solid #e5e7eb;
        color: #6b7280;
        font-size: 12px;
        line-height: 1.5;
      }

      @media (max-width: 960px) {
        .content {
          grid-template-columns: 1fr;
        }

        .status {
          width: 100%;
          margin-left: 0;
          padding-top: 6px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="ribbon">
        <div class="ribbon-group">
          <div class="ribbon-row">
            <button id="save-json" class="ribbon-button primary">保存 JSON</button>
            <button id="open-json" class="ribbon-button">打开 JSON</button>
            <button id="export-docx" class="ribbon-button primary">导出 DOCX</button>
            <button id="reset-demo" class="ribbon-button">重置</button>
          </div>
          <div class="ribbon-title">文件</div>
        </div>

        <div class="ribbon-group">
          <div class="ribbon-row">
            <select id="font-family" class="ribbon-select" title="字体">
              <option value="Microsoft YaHei">微软雅黑</option>
              <option value="SimSun">宋体</option>
              <option value="Arial">Arial</option>
              <option value="Times New Roman">Times</option>
            </select>
            <select id="font-size" class="ribbon-select" title="字号">
              <option value="12">12</option>
              <option value="14">14</option>
              <option value="16">16</option>
              <option value="18">18</option>
              <option value="24">24</option>
              <option value="32">32</option>
            </select>
            <button data-command="bold" class="ribbon-button icon" title="加粗">B</button>
            <button data-command="italic" class="ribbon-button icon" title="斜体"><em>I</em></button>
            <button data-command="underline" class="ribbon-button icon" title="下划线"><u>U</u></button>
            <input id="font-color" class="ribbon-color" type="color" value="#111827" title="字体颜色" />
            <input id="highlight-color" class="ribbon-color" type="color" value="#fff59d" title="高亮" />
          </div>
          <div class="ribbon-title">字体</div>
        </div>

        <div class="ribbon-group">
          <div class="ribbon-row">
            <button data-command="title" data-value="1" class="ribbon-button">标题 1</button>
            <button data-command="align" data-value="left" class="ribbon-button">左对齐</button>
            <button data-command="align" data-value="center" class="ribbon-button">居中</button>
            <button data-command="align" data-value="right" class="ribbon-button">右对齐</button>
            <button data-command="list" data-value="ol" class="ribbon-button">编号</button>
            <button data-command="list" data-value="ul" class="ribbon-button">项目符号</button>
          </div>
          <div class="ribbon-title">段落</div>
        </div>

        <div class="ribbon-group">
          <div class="ribbon-row">
            <button id="insert-link" class="ribbon-button">超链接</button>
            <button id="insert-image" class="ribbon-button">图片</button>
            <button id="insert-table" class="ribbon-button">表格</button>
            <button id="insert-page-break" class="ribbon-button">分页符</button>
          </div>
          <div class="ribbon-title">插入</div>
        </div>

        <div class="ribbon-group">
          <div class="ribbon-row">
            <button id="toggle-readonly" class="ribbon-button">只读</button>
            <button id="print-doc" class="ribbon-button">打印</button>
          </div>
          <div class="ribbon-title">视图</div>
        </div>

        <span id="status" class="status">Ready</span>
      </div>

      <div class="content">
        <div id="editor"></div>
        <div class="panel">
          <div class="panel-title">UcDoc JSON</div>
          <textarea id="ucdoc-json" spellcheck="false"></textarea>
          <div class="hint">
            这个示例展示：当前编辑器内容保存为 UcDoc JSON、从 UcDoc JSON 重新打开、再导出为 DOCX。实际业务系统可以把这段 JSON 保存到数据库、对象存储或网盘文件系统。
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import Editor, {
        UcDocEditorShell,
        createUcDocFile,
        createImageAsset,
        addImageAsset,
        exportUcDocToDocx,
        createDocxBlob,
        ElementType
      } from '../dist/canvas-editor.js'

      const statusEl = document.querySelector('#status')
      const jsonEl = document.querySelector('#ucdoc-json')
      const editorEl = document.querySelector('#editor')
      let readonly = false

      function setStatus(message) {
        statusEl.textContent = message
      }

      function downloadBlob(blob, fileName) {
        const url = URL.createObjectURL(blob)
        const anchor = document.createElement('a')
        anchor.href = url
        anchor.download = fileName
        anchor.style.display = 'none'
        document.body.appendChild(anchor)
        anchor.click()
        document.body.removeChild(anchor)
        URL.revokeObjectURL(url)
      }

      function callCommand(names, ...args) {
        const command = editor.command || {}
        const commandNames = Array.isArray(names) ? names : [names]
        const name = commandNames.find(item => typeof command[item] === 'function')
        if (!name) {
          setStatus(`当前构建未暴露命令：${commandNames.join(' / ')}`)
          return false
        }
        command[name](...args)
        setStatus(`已执行：${name}`)
        return true
      }

      function createDemoDoc() {
        const imageAsset = createImageAsset({
          id: 'image-logo',
          name: 'demo.png',
          mimeType: 'image/png',
          width: 80,
          height: 80,
          base64:
            'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAFgwJ/lHTB9QAAAABJRU5ErkJggg=='
        })

        const doc = createUcDocFile({
          metadata: {
            title: 'UcDoc DOCX Export Demo',
            author: 'ucdoc-editor'
          },
          data: {
            header: [
              {
                value: 'UcDoc Demo Header'
              }
            ],
            main: [
              {
                value: 'UcDoc DOCX Export Demo',
                bold: true,
                size: 24,
                styleId: 'title',
                paragraph: {
                  styleId: 'title',
                  align: 'center',
                  spacing: {
                    after: 12
                  }
                }
              },
              {
                value: '\n'
              },
              {
                value:
                  '这是一个 UcDoc 原生 JSON 文档示例。业务系统可以保存 JSON，用户需要时再导出 DOCX。'
              },
              {
                value: '\n'
              },
              {
                value: '第一项：保存 UcDoc JSON',
                numbering: {
                  numId: 'demo-list',
                  level: 0,
                  format: 'decimal'
                }
              },
              {
                value: '\n'
              },
              {
                value: '第二项：打开 UcDoc JSON',
                numbering: {
                  numId: 'demo-list',
                  level: 0,
                  format: 'decimal'
                }
              },
              {
                value: '\n'
              },
              {
                value: '第三项：导出 DOCX',
                numbering: {
                  numId: 'demo-list',
                  level: 0,
                  format: 'decimal'
                }
              },
              {
                value: '\n'
              },
              {
                type: ElementType.HYPERLINK,
                value: 'canvas-editor GitHub',
                url: 'https://github.com/Hufe921/canvas-editor'
              },
              {
                value: '\n'
              },
              {
                type: ElementType.IMAGE,
                value: '',
                width: 80,
                height: 80,
                imageProperties: {
                  assetId: 'image-logo',
                  altText: 'demo image',
                  caption: 'Demo Image'
                }
              },
              {
                value: '\n'
              },
              {
                type: ElementType.TABLE,
                value: '',
                colgroup: [{ width: 160 }, { width: 240 }],
                tableProperties: {
                  styleId: 'defaultTable',
                  width: 400,
                  widthType: 'fixed',
                  layout: 'fixed'
                },
                trList: [
                  {
                    height: 32,
                    pagingRepeat: true,
                    tdList: [
                      {
                        colspan: 1,
                        rowspan: 1,
                        width: 160,
                        value: [
                          {
                            value: '字段',
                            bold: true,
                            tableCellProperties: {
                              backgroundColor: '#eeeeee'
                            }
                          }
                        ]
                      },
                      {
                        colspan: 1,
                        rowspan: 1,
                        width: 240,
                        value: [
                          {
                            value: '说明',
                            bold: true,
                            tableCellProperties: {
                              backgroundColor: '#eeeeee'
                            }
                          }
                        ]
                      }
                    ]
                  },
                  {
                    height: 32,
                    tdList: [
                      {
                        colspan: 1,
                        rowspan: 1,
                        width: 160,
                        value: [
                          {
                            value: '源格式'
                          }
                        ]
                      },
                      {
                        colspan: 1,
                        rowspan: 1,
                        width: 240,
                        value: [
                          {
                            value: 'UcDoc JSON'
                          }
                        ]
                      }
                    ]
                  },
                  {
                    height: 32,
                    tdList: [
                      {
                        colspan: 1,
                        rowspan: 1,
                        width: 160,
                        value: [
                          {
                            value: '导出格式'
                          }
                        ]
                      },
                      {
                        colspan: 1,
                        rowspan: 1,
                        width: 240,
                        value: [
                          {
                            value: 'DOCX'
                          }
                        ]
                      }
                    ]
                  }
                ]
              }
            ],
            footer: [
              {
                value: 'UcDoc Demo Footer'
              }
            ]
          }
        })

        return {
          ...doc,
          assets: addImageAsset(doc.assets, imageAsset)
        }
      }

      const initialDoc = createDemoDoc()
      const editor = new Editor(editorEl, initialDoc.data, initialDoc.options)
      const shell = new UcDocEditorShell(editor, {
        initialDoc,
        onDirtyChange(dirty) {
          setStatus(dirty ? 'Unsaved changes' : 'Saved')
        },
        async onSave(doc) {
          localStorage.setItem('ucdoc-demo', JSON.stringify(doc))
        }
      })

      jsonEl.value = JSON.stringify(initialDoc, null, 2)

      document.querySelector('#save-json').addEventListener('click', async () => {
        const doc = await shell.saveUcDoc({
          metadata: {
            title: 'UcDoc DOCX Export Demo'
          }
        })
        jsonEl.value = JSON.stringify(doc, null, 2)
        setStatus('UcDoc JSON saved')
      })

      document.querySelector('#open-json').addEventListener('click', () => {
        const doc = JSON.parse(jsonEl.value)
        shell.openUcDoc(doc, {
          applyOptions: true
        })
        setStatus('UcDoc JSON opened')
      })

      document.querySelector('#export-docx').addEventListener('click', () => {
        const doc = shell.getUcDoc({
          metadata: {
            title: 'UcDoc DOCX Export Demo'
          }
        })
        const result = exportUcDocToDocx(doc, {
          fileName: 'ucdoc-docx-export-demo.docx'
        })
        downloadBlob(createDocxBlob(result), result.fileName)
        setStatus('DOCX exported')
      })

      document.querySelector('#reset-demo').addEventListener('click', () => {
        const doc = createDemoDoc()
        shell.openUcDoc(doc, {
          applyOptions: true
        })
        jsonEl.value = JSON.stringify(doc, null, 2)
        setStatus('Demo reset')
      })

      document.querySelectorAll('[data-command]').forEach(button => {
        button.addEventListener('click', () => {
          const command = button.dataset.command
          const value = button.dataset.value
          if (command === 'bold') callCommand(['executeBold'])
          if (command === 'italic') callCommand(['executeItalic'])
          if (command === 'underline') callCommand(['executeUnderline'])
          if (command === 'title') callCommand(['executeTitle'], Number(value))
          if (command === 'align') callCommand(['executeRowFlex'], value)
          if (command === 'list') {
            callCommand(
              ['executeList', 'executeListType'],
              value === 'ul' ? 'ul' : 'ol'
            )
          }
        })
      })

      document.querySelector('#font-family').addEventListener('change', event => {
        callCommand(['executeFont'], event.target.value)
      })

      document.querySelector('#font-size').addEventListener('change', event => {
        callCommand(['executeSize'], Number(event.target.value))
      })

      document.querySelector('#font-color').addEventListener('change', event => {
        callCommand(['executeColor'], event.target.value)
      })

      document.querySelector('#highlight-color').addEventListener('change', event => {
        callCommand(['executeHighlight'], event.target.value)
      })

      document.querySelector('#insert-link').addEventListener('click', () => {
        callCommand(['executeHyperlink'], 'https://github.com/uirmb/ucdoc-editor')
      })

      document.querySelector('#insert-image').addEventListener('click', () => {
        setStatus('图片插入通常需要文件选择器，本 demo 已在示例内容中包含图片。')
      })

      document.querySelector('#insert-table').addEventListener('click', () => {
        callCommand(['executeInsertTable', 'executeTable'], 3, 3)
      })

      document.querySelector('#insert-page-break').addEventListener('click', () => {
        callCommand(['executePageBreak', 'executeInsertElementList'], [
          {
            type: ElementType.PAGE_BREAK,
            value: ''
          }
        ])
      })

      document.querySelector('#toggle-readonly').addEventListener('click', () => {
        readonly = !readonly
        shell.setReadonly(readonly)
        setStatus(readonly ? 'Readonly mode' : 'Edit mode')
      })

      document.querySelector('#print-doc').addEventListener('click', () => {
        shell.print()
        setStatus('Print requested')
      })
    </script>
  </body>
</html>
